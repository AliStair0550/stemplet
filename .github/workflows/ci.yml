name: CI

# Kvalitetsgate: koerer typecheck, lint og tests paa hver PR og hvert push til
# main, saa en regression aldrig naar produktion ubemaerket. Tests bruger
# in-memory fakes (ingen database), saa jobbet er hurtigt og har ingen
# hemmeligheder. Dummy DATABASE_URL/DIRECT_URL er kun til `prisma generate`
# (som ikke forbinder til databasen).

on:
  push:
    branches: [main]
  pull_request:

# Afbryd en tidligere koersel paa samme gren, hvis der pushes igen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      # npm ci koerer postinstall (prisma generate), saa klienten findes til tsc.
      - name: Installer afhaengigheder
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  # Integrationstests mod en RIGTIG Postgres: verificerer laasene under aegte
  # samtidighed (to parallelle connections) - undo lost-update, kunde-loft-race,
  # velkomstbonus-een-gang, indloesning-een-gang - samt invariant-checket. Koerer
  # migrationerne fra bunden mod en frisk database (fanger ogsaa migration-drift).
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stemplet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/stemplet_test?schema=public"
      DIRECT_URL: "postgresql://test:test@localhost:5432/stemplet_test?schema=public"
      STAMP_TOKEN_SECRET: "ci-integration-secret-0123456789"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Installer afhaengigheder
        run: npm ci

      - name: Anvend migrationer paa frisk database
        run: npx prisma migrate deploy

      - name: Integrationstests (rigtige laase, parallelle connections)
        run: npm run test:integration
